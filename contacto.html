<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSS | Contacto</title>
  <meta name="description" content="Contacto MSS — Marine Systems & Structures." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { scroll-behavior: auto !important; margin: 0;   min-height: 100vh;
    }

    /* ── HEADER ── */
    .site-header {
      background: #ffffff;
      
      border-bottom: 1px solid #e0e6ed;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .header-inner { min-height: 80px; display: flex; align-items: center; justify-content: space-between; }
    .logo-wrap { display: flex; align-items: center; justify-content: center; padding: 0 28px 0 0; margin-left: 24px; background: none; border: none; cursor: pointer; text-decoration: none; flex-shrink: 0; align-self: center; }
    .logo-img { height: 52px; width: auto; max-height: 52px; display: block; object-fit: contain; object-position: left center; }
    .main-nav { display: flex; align-items: stretch; margin-left: auto; }
    .main-nav a {
      display: flex; align-items: center; justify-content: center;
      padding: 0 20px; min-height: 80px; font-size: 0.93rem; font-weight: 500;
      color: var(--blue-dark); text-decoration: none; white-space: nowrap;
      border-bottom: 3px solid transparent; transition: 0.18s ease;
    }
    .main-nav a:hover { color: var(--blue-main); background: rgba(45,111,174,0.06); }
        .main-nav a.active { color: #fff; background: var(--blue-dark); font-weight: 600; }
    .main-nav a.active:hover { color: #fff !important; background: var(--blue-main) !important; }
    .nav-social { display: flex; align-items: center; margin-left: 16px; }
    .social-link.linkedin { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 4px; background: var(--blue-main); color: white; font-weight: 800; font-size: 0.95rem; }
    .menu-toggle { display: none; background: none; border: none; color: var(--blue-main); font-size: 1.7rem; cursor: pointer; align-self: center; }

    /* ── HERO CONTACTO ── */
    .ct-hero {
      background: url("img/hero.jpg") center / cover no-repeat;
      padding: 72px 0 80px;
      position: relative;
      overflow: hidden;
    }
    .ct-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(10, 25, 50, 0.72) 0%,
        rgba(10, 25, 50, 0.45) 60%,
        rgba(10, 25, 50, 0.20) 100%
      );
    }
    .ct-hero-inner {
      position: relative;
      z-index: 2;
      max-width: 680px;
    }
    .ct-hero-kicker {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .ct-hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      font-weight: 600;
      color: #fff;
      margin: 0 0 18px;
      line-height: 1.1;
    }
    .ct-hero-lead {
      color: rgba(255,255,255,0.78);
      font-size: 1.05rem;
      line-height: 1.65;
      margin: 0;
      font-weight: 300;
    }

    /* ── CUERPO ── */
    .ct-body {
      background: #f5f7fa;
      padding: 60px 0 80px;
    }
    .ct-body .container {
      max-width: 1000px;
    }

    /* Tarjetas info */
    .ct-info-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #dde4ec;
      margin-bottom: 52px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .ct-info-card {
      background: #fff;
      padding: 32px 28px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .ct-info-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #eef4fb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ct-info-icon svg { width: 20px; height: 20px; }
    .ct-info-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-main);
      margin: 0 0 5px;
    }
    .ct-info-value {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--blue-dark);
      margin: 0;
    }

    /* Formulario */
    .ct-form-wrap {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Panel izquierdo */
    .ct-form-left {
      background: linear-gradient(160deg, var(--blue-dark) 0%, #1e5799 100%);
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .ct-form-left h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 14px;
      line-height: 1.2;
    }
    .ct-form-left p {
      color: rgba(255,255,255,0.72);
      font-size: 0.94rem;
      line-height: 1.65;
      margin: 0 0 36px;
    }
    .ct-form-features {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ct-form-feat {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .ct-form-feat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .ct-form-feat span {
      color: rgba(255,255,255,0.82);
      font-size: 0.91rem;
      line-height: 1.5;
    }
    .ct-form-left-footer {
      margin-top: auto;
      padding-top: 36px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .ct-form-left-footer p {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      margin: 0;
    }

    /* LAYOUT PRINCIPAL */
    .ct-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    .ct-msg-img-row {
      display: block;
      margin-bottom: 14px;
      width: 100%;
    }
    .ct-msg-img-row .ct-field { margin-bottom: 0; }
    .ct-msg-img-row textarea { height: 100%; min-height: 160px; max-height: 160px; resize: none; }
    .ct-inline-img {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(22,59,102,0.12);
      min-height: 160px;
      max-height: 160px;
    }
    .ct-inline-img img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .ct-form-panel {
      background: #f5f7fa;
      border-radius: 16px;
      box-shadow: none;
      border: none;
      padding: 36px 36px 32px;
      max-width: 780px;
      margin: 0 auto;
    }
    .ct-form-kicker {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--blue-main);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      margin: 0 0 8px;
      text-align: center;
    }
    .ct-form-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin: 0;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }
    .ct-side-img {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(22,59,102,0.14);
      position: sticky;
      top: 100px;
      min-height: 400px;
      background: #e8edf3;
    }
    .ct-side-img img {
      width: 100%;
      height: 100%;
      min-height: 400px;
      object-fit: cover;
      display: block;
    }

    /* Panel derecho — formulario */
    .ct-form-right {
      padding: 44px 44px 44px;
    }
    .ct-form-right h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin: 0 0 28px;
    }
    .ct-field-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .ct-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ct-field label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-main);
    }
    .ct-field input,
    .ct-field textarea {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--blue-dark);
      background: #f8fafc;
      border: 1.5px solid #dde4ec;
      border-radius: 8px;
      padding: 13px 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }
    .ct-field input:focus,
    .ct-field textarea:focus {
      border-color: var(--blue-main);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(45,111,174,0.1);
    }
    .ct-field-full { margin-bottom: 14px; }
    .ct-field-full textarea { min-height: 130px; width: 100%; box-sizing: border-box; }
    .ct-submit {
      width: 100%;
      background: var(--blue-main);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 15px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
      margin-top: 6px;
    }
    .ct-submit:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .ct-info-row { grid-template-columns: 1fr; }
      .ct-form-wrap { grid-template-columns: 1fr; }
      .ct-form-left { padding: 32px 28px; }
      .ct-form-right { padding: 32px 28px; }
    }
    @media (max-width: 900px) {
      .ct-layout { grid-template-columns: 1fr; gap: 28px; }
      .ct-side-img { position: static; min-height: 240px; }
      .ct-side-img img { min-height: 240px; }
      .ct-form-panel { padding: 32px 28px; }
    }
    @media (max-width: 820px) {
      .main-nav { display: none; flex-direction: column; width: 100%; background: #fff; }
      .main-nav.active { display: flex; }
      .main-nav a { min-height: 52px; justify-content: flex-start; padding: 0 16px; border-bottom: 1px solid #eee; }
      .menu-toggle { display: block; }
      .header-inner { min-height: auto !important; padding: 10px 0; flex-wrap: wrap; }
      .logo-img { height: 40px; }
      .nav-social { display: none; }
      .ct-hero { padding: 48px 0 56px; }
      .ct-field-row { grid-template-columns: 1fr; }
      .ct-form-left, .ct-form-right { padding: 24px 20px; }
    }
    @media (max-width: 600px) {
      .ct-hero h1 { font-size: 1.5rem; }
      .ct-form-left, .ct-form-right { padding: 20px 16px; }
      .ct-info-row { gap: 16px; }
    }
      
      
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a href="index.html" class="logo-wrap" aria-label="Ir al inicio">
        <img src="img/logo2.png" alt="MSS Marine Systems & Structures" class="logo-img" />
      </a>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Nuestros servicios</a>
        <a href="experiencia.html">Experiencia del equipo</a>
        <a href="nosotros.html">Nosotros</a>
        <a class="active" href="contacto.html">Contacto</a>
      </nav>
      <div class="nav-social">
        <a href="https://www.linkedin.com/company/mss-marine-systems-structures" target="_blank" class="social-link linkedin" aria-label="LinkedIn">in</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
    </div>
  </header>

  <main>

    <!-- ── FORMULARIO ── -->
    <section style="background:#eef4fd; padding: 80px 0;">
      <div class="container" style="position:relative;z-index:2;">

        <div style="text-align:center;margin-bottom:48px;">
          <p style="font-size:0.75rem;font-weight:700;color:var(--blue-main);letter-spacing:0.15em;text-transform:uppercase;margin:0 0 8px;">CONTACTO</p>
          <h3 style="font-size:2rem;font-weight:700;color:var(--blue-dark);margin:0 0 12px;">Envíanos un mensaje</h3>
          <div style="width:48px;height:3px;background:var(--blue-main);margin:0 auto;border-radius:2px;"></div>
        </div>

        <form id="contactForm" style="max-width:900px;margin:0 auto;">
          <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:32px 48px;margin-bottom:32px;">
            <div>
              <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Nombre y Apellido :</label>
              <input type="text" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;" />
            </div>
            <div>
              <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Teléfono :</label>
              <input type="tel" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;" />
            </div>
            <div>
              <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Email :</label>
              <input type="email" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;" />
            </div>
            <div>
              <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Compañía :</label>
              <input type="text" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;" />
            </div>
            <div>
              <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">País :</label>
              <input type="text" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;" />
            </div>
          </div>
          <div style="margin-bottom:32px;">
            <label style="display:block;font-size:0.75rem;font-weight:700;color:var(--blue-dark);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Mensaje :</label>
            <textarea style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.75);border:1.5px solid #c8d8ea;border-radius:8px;padding:14px 16px;color:var(--blue-dark);font-size:0.95rem;outline:none;min-height:160px;resize:vertical;"></textarea>
          </div>
          <button type="submit" style="width:100%;padding:16px;background:var(--blue-main);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s;">Enviar mensaje</button>
        </form>

      </div>
    </section>

  </main>

  <!-- FOOTER -->

  <script>
    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('mainNav').classList.toggle('active');
    });
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      this.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--blue-dark)"><p style="font-size:1.5rem;margin:0 0 10px">✓</p><p style="font-weight:600;font-size:1.05rem;margin:0 0 8px">Mensaje enviado</p><p style="color:var(--text-main);font-size:0.95rem;margin:0">Te contactaremos en menos de 24 horas hábiles.</p></div>';
    });
  </script>

  <footer style="background:#163b66;border-top:1px solid rgba(255,255,255,0.08);padding:10px 0;width:100%;box-sizing:border-box;">
    <div style="width:100%;max-width:1500px;margin:0 auto;padding:0 40px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;gap:24px;">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <img src="img/logo2.png" alt="MSS" style="height:52px;width:auto;object-fit:contain;filter:brightness(0) invert(1);" />
        <p style="font-size:0.72rem;color:rgba(255,255,255,0.35);margin:2px 0 0;line-height:1.4;">&copy; 2026 Marine Systems &amp; Structures<br>Vi&ntilde;a del Mar, Chile</p>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
        <span style="color:#ffffff;font-size:1rem;font-weight:400;">14 Nte. 976, Vi&ntilde;a del Mar, Valpara&iacute;so</span>
      </div>
      <div style="display:flex;align-items:center;">
        <a href="https://linkedin.com" target="_blank" style="display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:#2d6fae;color:#fff;font-weight:800;font-size:0.95rem;border-radius:6px;text-decoration:none;">in</a>
      </div>
    </div>
  </footer>

</body>
</html>
